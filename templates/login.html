<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login | TaskFlow AI</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body class="auth-body">

<div class="auth-container">

    <div class="auth-card">

        <h1>
            🚀 TaskFlow AI
        </h1>

        <p>

            Plataforma inteligente para organizar tareas,
            fechas de entrega y mejorar la productividad.

        </p>

        {% if error %}

            <div class="error-message">

                {{ error }}

            </div>

        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Usuario"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">

                Ingresar

            </button>

        </form>

        <div class="auth-links">

            <p>

                ¿No tienes cuenta?

                <a href="/register">

                    Regístrate aquí

                </a>

            </p>

        </div>

    </div>

</div>

</body>
</html>
